<!DOCTYPE HTML>
<HTML lang=en>
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
     <title>sigmga</title>
     <link rel="stylesheet" href="style.css">
        <style>
        @import url('https://fonts.cdnfonts.com/css/violet-sans');
        
        body {
          background-image: url('images/miku3.png');
          background-repeat: no-repeat; 
          background-size: cover;     
          background-attachment: fixed;
          background-size:100%;
          background-position: center;
        }
        ::-webkit-scrollbar {
        width: 10px;
          }
        ::-webkit-scrollbar-track {
        background: #f1f1f1; 
          }
        ::-webkit-scrollbar-thumb {
        background: #888; 
          }
        ::-webkit-scrollbar-thumb:hover {
        background: #555; 
          }
        * {
          box-sizing: border-box;
          margin:0px;
          padding:0px;
        }
        .column {
          float: left;
          padding: 10px;
          height:1500px;
        }
        .left {
          width: 14%;
          border-radius:5px;
          margin-left:7px;
        }
        .right {
          width: 84%;
          margin-left:10px;
          border-radius:5px;
        }
        .row:after {
          content: "";
          display: table;
          clear: both;
        }
        .left h1{
          font-family:'Poppins';
          font-size:30px;
          margin-left: 3px;
          margin-top:15px;
          align-text:center;
          justify-content:center;
        }
        .left a{
          font-family:'Violet Sans';
          font-size:1em;
          margin-left: 15px;
          font-decoration:none;
        }
        .right h1 {
          font-family:'Poppins';
          font-size:3em;
          margin-left: 15px;
          margin-top:15px;
        }
        .right h2{
          font-family:'Poppins';
          font-size:2em;
          margin-left:20px;
        }
        .right p{
          font-family:'Violet Sans';
          margin-left:15px;
          margin-top:0px;
          font-size:1em;
        }
        </style>
