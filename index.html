<!DOCTYPE HTML>
<HTML lang=en>
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
     <title>sigmga</title>
     <link rel="stylesheet" href="style.css">
      <style>
        body {
          background-image: url('images/miku3.png');
          background-repeat: no-repeat; 
          background-size: cover;     
          background-attachment: fixed;
          background-size:100%;
          background-position: center;
        }
        ::-webkit-scrollbar {
        width: 10px;
          }
        ::-webkit-scrollbar-track {
        background: #f1f1f1; 
          }
        ::-webkit-scrollbar-thumb {
        background: #888; 
          }
        ::-webkit-scrollbar-thumb:hover {
        background: #555; 
          }
        * {
          box-sizing: border-box;
        }
        .column {
          float: left;
          padding: 10px;
          height:500px;
        }
        .left {
          width: 15%;
        }
        .right {
          width: 85%;
          margin-left:30px;
        }
        .row:after {
          content: "";
          display: table;
          clear: both;
        }
      </style>
  </head>
  <body>
    <div class="banner">
      <div class="slider" style="--quantity:10">
        <div class="item" style="--position:1"><img src="images/tetoslider.jpg"></div>
        <div class="item" style="--position:2"><img src="images/yixislider.jpg"></div>
        <div class="item" style="--position:3"><img src="images/forteslider.jpg"></div>
        <div class="item" style="--position:4"><img src="images/gumislider.jpg"></div>
        <div class="item" style="--position:5"><img src="images/meikoslider.jpg"></div>
        <div class="item" style="--position:6"><img src="images/kaiotsliders.jpg"></div>
        <div class="item" style="--position:7"><img src="images/lukaslider.jpg"></div>
        <div class="item" style="--position:8"><img src="images/lenslider.jpg"></div>
        <div class="item" style="--position:9"><img src="images/rinslider.jpg"></div>
        <div class="item" style="--position:10"><img src="images/mikuslider.jpg"></div>
      </div>
    </div>
    <div class="row">
      <div class="column left" style="background-color: rgba(197, 213, 226, 0.85);">
        <h2>Column 1</h2>
        <p>Some text..</p>
      </div>
      <div class="column right" style="background-color: rgba(197, 213, 226, 0.85);">
        <h2>Column 2</h2>
        <p>Some text..</p>
      </div>
    </div>
  </body>
</HTML>
